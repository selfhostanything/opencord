name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 26
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm build
      - run: pnpm lint

  security:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: Scan dependencies with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          version: v0.71.2
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          hide-progress: true
      - name: Generate CycloneDX SBOM
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          version: v0.71.2
          scan-type: fs
          scan-ref: .
          format: cyclonedx
          output: opencord-clients-sbom.cdx.json
          list-all-pkgs: true
          hide-progress: true
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: opencord-clients-sbom
          path: opencord-clients-sbom.cdx.json
          if-no-files-found: error
